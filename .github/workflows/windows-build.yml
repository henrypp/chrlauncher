name: Windows build

on:
  push:
    branches:
      - master
      - main
      - restore/**
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build x64 portable temp-runner
    runs-on: windows-latest

    steps:
      - name: Checkout chrlauncher
        uses: actions/checkout@v7
        with:
          path: x
          submodules: false

      - name: Checkout routine dependency
        uses: actions/checkout@v7
        with:
          repository: henrypp/routine
          path: routine

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build x64
        working-directory: x
        run: >
          msbuild chrlauncher.sln
          /m
          /p:Configuration=Release
          /p:Platform=x64
          /p:PreferredToolArchitecture=x64
          /verbosity:minimal

      - name: Verify portable layout
        shell: pwsh
        working-directory: x
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @(
            'bin\chrlauncher.x64.exe',
            'bin\RUN_CHRLAUNCHER_X64.bat',
            'bin\README_PORTABLE_LAYOUT.txt',
            'bin\Addons\config.ini'
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              Get-ChildItem -Path bin -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
              throw "Missing portable artifact file: $path"
            }
          }
          $runner = Get-Content -LiteralPath 'bin\RUN_CHRLAUNCHER_X64.bat' -Raw
          foreach ($needle in @('%TEMP%\chrlauncher_temp_run_', 'copy /Y', 'pushd "%ROOT%"', 'start "" "%TMP_EXE%"')) {
            if ($runner -notlike "*$needle*") { throw "Temp runner marker missing: $needle" }
          }
          Get-Item -LiteralPath 'bin\chrlauncher.x64.exe' | Format-List FullName, Length, LastWriteTimeUtc

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: chrlauncher-restore-x64-temp-runner
          path: x/bin/**
          if-no-files-found: error
